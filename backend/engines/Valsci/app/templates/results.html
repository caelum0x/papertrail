{% extends "base.html" %}

{% block head_extra %}
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
{% endblock %}

{% block content %}
    <section class="panel">
        <div class="panel-header">
            <div>
                <h2 class="panel-title">Report Actions</h2>
                <p class="panel-subtitle">Download report artifacts, inspect traces, or delete this claim run.</p>
            </div>
            <a href="{{ url_for('api.guidebook_page') }}#results" class="help-link" title="Guidebook: Claim Report">?</a>
        </div>
        <div id="reportStatus" class="status-card info-card hidden"></div>
        <div class="inline-actions">
            <button id="downloadReport" type="button" class="primary-button">Download Report</button>
            <button id="viewTracePage" type="button" class="secondary-button">View Full Trace</button>
            <button id="downloadTrace" type="button" class="secondary-button">Download Trace</button>
            <button id="downloadIssues" type="button" class="secondary-button">Download Issues</button>
            <button id="downloadCitations" type="button" class="secondary-button">Download Citations</button>
            <button id="deleteClaimButton" type="button" class="danger-button">Delete Claim</button>
        </div>
    </section>

    <section id="issuesBanner"></section>
    <section id="reportContent" class="panel"></section>
    <section id="usageStats" class="panel hidden"></section>
    <section id="usageByStage" class="panel hidden"></section>
    <section id="promptProvenance" class="panel hidden"></section>
    <section id="debugTrace" class="panel hidden"></section>

    <script>
        window.resultsPageConfig = {
            claimId: {{ claim_id|tojson }},
            batchId: {{ batch_id|tojson }},
        };
    </script>
{% endblock %}

{% block scripts %}
    <script>
        const { escapeHtml, fetchJson, setStatus, flashButton, buttonBusy } = window.ValsciUI;
        const urlParams = new URLSearchParams(window.location.search);
        const claimId = urlParams.get('claim_id') || window.resultsPageConfig?.claimId;
        const batchId = urlParams.get('batch_id') || window.resultsPageConfig?.batchId;
        const reportContent = document.getElementById('reportContent');
        const reportStatus = document.getElementById('reportStatus');
        const issuesBanner = document.getElementById('issuesBanner');
        const usageStatsContainer = document.getElementById('usageStats');
        const usageByStageContainer = document.getElementById('usageByStage');
        const promptProvenanceContainer = document.getElementById('promptProvenance');
        const debugTraceContainer = document.getElementById('debugTrace');

        const allowedMarkdownTags = new Set([
            'A', 'B', 'BLOCKQUOTE', 'BR', 'CODE', 'DIV', 'EM', 'H1', 'H2', 'H3', 'H4', 'H5',
            'H6', 'HR', 'I', 'LI', 'OL', 'P', 'PRE', 'S', 'SPAN', 'STRONG', 'TABLE', 'TBODY',
            'TD', 'TH', 'THEAD', 'TR', 'UL',
        ]);

        function sanitizeHtml(html) {
            const template = document.createElement('template');
            template.innerHTML = html;
            const walker = document.createTreeWalker(template.content, NodeFilter.SHOW_ELEMENT);
            const remove = [];
            while (walker.nextNode()) {
                const node = walker.currentNode;
                if (!allowedMarkdownTags.has(node.tagName)) {
                    remove.push(node);
                    continue;
                }
                Array.from(node.attributes).forEach((attr) => {
                    const name = attr.name.toLowerCase();
                    if (node.tagName === 'A' && name === 'href') {
                        const safe = safeUrl(attr.value);
                        if (safe) {
                            node.setAttribute('href', safe);
                            node.setAttribute('target', '_blank');
                            node.setAttribute('rel', 'noopener noreferrer');
                        } else {
                            node.removeAttribute('href');
                        }
                        return;
                    }
                    node.removeAttribute(attr.name);
                });
            }
            remove.forEach((node) => node.replaceWith(document.createTextNode(node.textContent || '')));
            return template.innerHTML;
        }

        function safeMarkdown(value) {
            const text = String(value ?? '');
            if (!text) return '';
            if (!window.marked?.parse) {
                return escapeHtml(text).replace(/\n/g, '<br>');
            }
            return sanitizeHtml(marked.parse(text, { breaks: true }));
        }

        function safeUrl(value) {
            if (!String(value || '').trim()) return null;
            try {
                const url = new URL(String(value || ''), window.location.origin);
                if (['http:', 'https:', 'mailto:'].includes(url.protocol)) {
                    return url.href;
                }
            } catch (error) {
                return null;
            }
            return null;
        }

        function safeLink(url, label, className = '') {
            const href = safeUrl(url);
            if (!href) return '';
            return `<a href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer" class="${escapeHtml(className)}">${escapeHtml(label)}</a>`;
        }

        function getRatingText(rating) {
            if (rating === null || rating === undefined) return 'No Rating';
            if (rating === 0) return 'No Evidence';
            if (rating === 1) return 'Contradicted';
            if (rating === 2) return 'Likely False';
            if (rating === 3) return 'Mixed Evidence';
            if (rating === 4) return 'Likely True';
            if (rating === 5) return 'Highly Supported';
            return 'No Rating';
        }

        function getRatingTone(rating) {
            if (rating === 1 || rating === 2) return 'error-card';
            if (rating === 4 || rating === 5) return 'success-card';
            if (rating === 3) return 'warning-card';
            return 'info-card';
        }

        function formatDateLabel(value) {
            if (!value) return 'Unknown';
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleString();
        }

        function buildTraceViewerUrl(focusTraceId) {
            if (!claimId || !batchId) return '#';
            const base = `/claims/${encodeURIComponent(batchId)}/${encodeURIComponent(claimId)}/trace`;
            if (!focusTraceId) return base;
            const params = new URLSearchParams();
            params.set('focus_trace_id', String(focusTraceId));
            return `${base}?${params.toString()}`;
        }

        function normalizePromptEntry(entry = {}) {
            const systemPrompt = entry.system_prompt || {};
            const userPrompt = entry.user_prompt || {};
            return {
                promptSetHash: entry.prompt_set_hash || null,
                renderedPromptHash: entry.rendered_prompt_hash || null,
                systemFile: entry.system_prompt_file || systemPrompt.file_name || null,
                userFile: entry.user_prompt_file || userPrompt.file_name || null,
                systemHash: entry.system_prompt_sha256 || systemPrompt.sha256 || null,
                userHash: entry.user_prompt_sha256 || userPrompt.sha256 || null,
                modifiedAt: entry.prompt_file_modified_at || systemPrompt.modified_at || userPrompt.modified_at || null,
            };
        }

        function renderIssues(issues) {
            if (!Array.isArray(issues) || issues.length === 0) {
                issuesBanner.innerHTML = '';
                return;
            }
            const errorCount = issues.filter(issue => issue.severity === 'ERROR').length;
            const warnCount = issues.filter(issue => issue.severity === 'WARN').length;
            const tone = errorCount > 0 ? 'error-card' : 'warning-card';
            const title = errorCount > 0
                ? `${errorCount} error(s) and ${warnCount} warning(s) surfaced during processing`
                : `${warnCount} warning(s) surfaced during processing`;
            issuesBanner.innerHTML = `
                <div class="status-card ${tone}">
                    <strong>${escapeHtml(title)}</strong>
                    <ul>
                        ${issues.map((issue) => {
                            const traceId = issue?.details?.trace_id ? String(issue.details.trace_id) : '';
                            const traceLink = traceId ? ` <a href="${buildTraceViewerUrl(traceId)}">View trace section</a>` : '';
                            return `<li>[${escapeHtml(issue.severity)}] ${escapeHtml(issue.stage)}: ${escapeHtml(issue.message)}${traceLink}</li>`;
                        }).join('')}
                    </ul>
                </div>
            `;
        }

        function renderDebugTrace(debugTrace) {
            if (!debugTrace?.summary) {
                debugTraceContainer.classList.add('hidden');
                debugTraceContainer.innerHTML = '';
                return;
            }
            const summary = debugTrace.summary;
            debugTraceContainer.classList.remove('hidden');
            debugTraceContainer.innerHTML = `
                <div class="panel-header">
                    <div>
                        <h2 class="panel-title">Debug and Trace</h2>
                        <p class="panel-subtitle">Routing, token, retry, and trace-file details.</p>
                    </div>
                </div>
                <div class="summary-strip">
                    <div class="summary-cell"><span class="label">LLM Calls</span><span class="value">${Number(summary.llm_calls || 0)}</span></div>
                    <div class="summary-cell"><span class="label">Input Tokens</span><span class="value">${Number(summary.total_input_tokens || 0).toLocaleString()}</span></div>
                    <div class="summary-cell"><span class="label">Output Tokens</span><span class="value">${Number(summary.total_output_tokens || 0).toLocaleString()}</span></div>
                    <div class="summary-cell"><span class="label">Cost</span><span class="value">$${Number(summary.total_cost_usd || 0).toFixed(4)}</span></div>
                </div>
                <div class="record-meta" style="margin-top:14px">
                    <span>Models: ${escapeHtml((summary.models_used || []).join(', ') || 'Unknown')}</span>
                    <span>Retries: ${Number(summary.retries || 0)}</span>
                    <span>Context overflow prevented: ${Number(summary.context_overflow_prevented || 0)}</span>
                    <span>Intentional truncations: ${Number(summary.intentional_truncations || 0)}</span>
                    <span>Trace file: ${escapeHtml(debugTrace.trace_file || '')}</span>
                </div>
                <div class="inline-actions" style="margin-top:14px">
                    <a href="${buildTraceViewerUrl()}" class="secondary-button small-button">Open Full Trace Viewer</a>
                </div>
            `;
        }

        function renderUsageByStage(usageByStage) {
            if (!usageByStage || typeof usageByStage !== 'object' || Object.keys(usageByStage).length === 0) {
                usageByStageContainer.classList.add('hidden');
                usageByStageContainer.innerHTML = '';
                return;
            }
            usageByStageContainer.classList.remove('hidden');
            usageByStageContainer.innerHTML = `
                <div class="panel-header">
                    <div>
                        <h2 class="panel-title">Usage By Stage</h2>
                        <p class="panel-subtitle">Token and cost accounting for each pipeline stage.</p>
                    </div>
                </div>
                <div class="comparison-scroll">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Stage</th>
                                <th>Input</th>
                                <th>Output</th>
                                <th>Total</th>
                                <th>Cost</th>
                                <th>Estimated</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.entries(usageByStage).map(([stage, stats]) => `
                                <tr>
                                    <td>${escapeHtml(stage.replace(/_/g, ' '))}</td>
                                    <td>${Number(stats.input_tokens || 0).toLocaleString()}</td>
                                    <td>${Number(stats.output_tokens || 0).toLocaleString()}</td>
                                    <td>${Number(stats.total_tokens || 0).toLocaleString()}</td>
                                    <td>$${Number(stats.cost_usd || 0).toFixed(4)}</td>
                                    <td>${stats.is_estimated ? 'Yes' : 'No'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderPromptProvenance(promptProvenance) {
            if (!promptProvenance || typeof promptProvenance !== 'object' || Object.keys(promptProvenance).length === 0) {
                promptProvenanceContainer.classList.add('hidden');
                promptProvenanceContainer.innerHTML = '';
                return;
            }
            promptProvenanceContainer.classList.remove('hidden');
            promptProvenanceContainer.innerHTML = `
                <details open>
                    <summary><strong>Prompt Provenance</strong></summary>
                    <div class="panel-divider"></div>
                    <div class="record-list">
                        ${Object.entries(promptProvenance).map(([stage, rawEntry]) => {
                            const entry = normalizePromptEntry(rawEntry);
                            return `
                                <article class="record-card">
                                    <div class="panel-header">
                                        <div>
                                            <h3 class="panel-title">${escapeHtml(stage.replace(/_/g, ' '))}</h3>
                                            <p class="panel-subtitle">${escapeHtml(entry.systemFile || 'No system prompt file recorded')}</p>
                                        </div>
                                        <span class="badge neutral-badge">${escapeHtml((entry.promptSetHash || 'Pending').slice(0, 12))}</span>
                                    </div>
                                    <div class="record-meta">
                                        <span>User prompt: ${escapeHtml(entry.userFile || 'Unknown')}</span>
                                        <span>Rendered hash: ${escapeHtml((entry.renderedPromptHash || 'Pending').slice(0, 12))}</span>
                                        <span>Modified: ${escapeHtml(formatDateLabel(entry.modifiedAt))}</span>
                                    </div>
                                    <div class="pill-row">
                                        <span class="pill">System ${escapeHtml((entry.systemHash || 'Pending').slice(0, 12))}</span>
                                        <span class="pill">User ${escapeHtml((entry.userHash || 'Pending').slice(0, 12))}</span>
                                    </div>
                                </article>
                            `;
                        }).join('')}
                    </div>
                </details>
            `;
        }

        function paperAuthors(authors, includeHIndex = true) {
            if (!Array.isArray(authors) || !authors.length) return 'Authors not available';
            return authors.map((author) => {
                const name = typeof author === 'string' ? author : author.name;
                if (!includeHIndex || typeof author === 'string') return name || 'Unknown author';
                return `${name || 'Unknown author'} (H-index: ${Number(author.hIndex || 0)})`;
            }).join(', ');
        }

        function renderMarkdownList(values, emptyLabel) {
            if (!Array.isArray(values) || !values.length) {
                return `<p class="helper-text">${escapeHtml(emptyLabel)}</p>`;
            }
            return `<ul class="content-list">${values.map(item => `<li>${safeMarkdown(item?.citation || item)}</li>`).join('')}</ul>`;
        }

        function renderPaperCard(paper, options = {}) {
            const title = paper?.title || 'Untitled paper';
            const link = safeLink(paper?.link, 'Read Paper', 'secondary-button small-button');
            return `
                <article class="record-card">
                    <div class="stack">
                        <h4 class="panel-title">${escapeHtml(title)}</h4>
                        <div class="record-meta">
                            <span>${escapeHtml(paperAuthors(paper?.authors, options.includeHIndex !== false))}</span>
                            ${paper?.content_type ? `<span>${escapeHtml(paper.content_type)}</span>` : ''}
                        </div>
                        ${paper?.relevance ? `<div><strong>Relevance</strong><div class="helper-text">${safeMarkdown(paper.relevance)}</div></div>` : ''}
                        ${paper?.explanation ? `<div><strong>Why Not Relevant</strong><div class="helper-text">${safeMarkdown(paper.explanation)}</div></div>` : ''}
                        ${paper?.bibliometric_impact !== undefined ? `<p class="helper-text"><strong>Bibliometric Impact:</strong> ${escapeHtml(paper.bibliometric_impact)}</p>` : ''}
                        ${paper?.reason ? `<p class="helper-text"><strong>Reason:</strong> ${escapeHtml(paper.reason)}</p>` : ''}
                        ${paper?.excerpts !== undefined ? `<div><strong>Excerpts</strong>${renderMarkdownList(Array.isArray(paper.excerpts) ? paper.excerpts : [paper.excerpts], 'No excerpts available')}</div>` : ''}
                        ${paper?.explanations !== undefined ? `<div><strong>Explanations</strong>${renderMarkdownList(Array.isArray(paper.explanations) ? paper.explanations : [paper.explanations], 'No explanations available')}</div>` : ''}
                        ${paper?.citations !== undefined ? `<div><strong>Citations</strong>${renderMarkdownList(paper.citations, 'No citations available')}</div>` : ''}
                        ${link ? `<div class="inline-actions">${link}</div>` : ''}
                    </div>
                </article>
            `;
        }

        function renderPaperSection(title, papers, emptyLabel, options = {}) {
            return `
                <section class="stack">
                    <h3 class="panel-title">${escapeHtml(title)}</h3>
                    <div class="record-list">
                        ${Array.isArray(papers) && papers.length
                            ? papers.map((paper) => renderPaperCard(paper, options)).join('')
                            : `<div class="empty-state"><strong>${escapeHtml(emptyLabel)}</strong></div>`}
                    </div>
                </section>
            `;
        }

        function displayReport(data) {
            const report = data.report || {};
            const rating = report.claimRating;
            renderIssues(report.issues || []);
            renderDebugTrace(report.debug_trace || null);
            renderPromptProvenance(data.prompt_provenance || data.run_summary?.prompt_provenance || {});
            renderUsageByStage(report.usage_by_stage || {});

            const usage = report.usage_summary || report.usage_stats;
            if (usage) {
                usageStatsContainer.classList.remove('hidden');
                usageStatsContainer.innerHTML = `
                    <div class="panel-header">
                        <div>
                            <h2 class="panel-title">LLM Usage</h2>
                            <p class="panel-subtitle">Aggregate token and cost totals for this report.</p>
                        </div>
                    </div>
                    <div class="summary-strip">
                        <div class="summary-cell"><span class="label">Input</span><span class="value">${Number(usage.input_tokens || 0).toLocaleString()}</span></div>
                        <div class="summary-cell"><span class="label">Output</span><span class="value">${Number(usage.output_tokens || 0).toLocaleString()}</span></div>
                        <div class="summary-cell"><span class="label">Total</span><span class="value">${Number(usage.total_tokens || 0).toLocaleString()}</span></div>
                        <div class="summary-cell"><span class="label">Cost</span><span class="value">$${Number(usage.cost_usd || usage.total_cost || 0).toFixed(4)}</span></div>
                    </div>
                    <p class="helper-text" style="margin-top:14px">Token counts estimated: ${usage.is_estimated ? 'Yes' : 'No'}</p>
                `;
            } else {
                usageStatsContainer.classList.add('hidden');
            }

            const timing = report.timing_stats || {};
            reportContent.innerHTML = `
                <div class="stack">
                    <div class="panel-header">
                        <div>
                            <h2 class="page-title">Claim: ${escapeHtml(data.text || 'Untitled claim')}</h2>
                            <p class="page-subtitle">Status: ${escapeHtml(data.status || 'unknown')}</p>
                        </div>
                    </div>
                    <div class="status-card ${getRatingTone(rating)}">
                        <strong>Overall Assessment: ${escapeHtml(getRatingText(rating))}</strong>
                        <span>Rating value: ${rating ?? 'N/A'}</span>
                    </div>
                    <div class="markdown-content">${report.explanation ? safeMarkdown(report.explanation) : '<p class="helper-text">No explanation available.</p>'}</div>
                    ${report.finalReasoning ? `
                        <details class="panel panel-muted">
                            <summary><strong>Final Reasoning</strong></summary>
                            <div class="panel-divider"></div>
                            <div class="markdown-content">${safeMarkdown(report.finalReasoning)}</div>
                        </details>
                    ` : ''}
                    ${renderPaperSection('Relevant Papers', report.relevantPapers, 'No relevant papers available.')}
                    ${renderPaperSection('Other Reviewed Papers', report.nonRelevantPapers, 'No other papers were reviewed.')}
                    ${renderPaperSection('Inaccessible Papers', report.inaccessiblePapers, 'No inaccessible papers were found.', { includeHIndex: false })}
                    <section class="stack">
                        <h3 class="panel-title">Search Queries</h3>
                        ${Array.isArray(report.searchQueries) && report.searchQueries.length
                            ? `<ol>${report.searchQueries.map(query => `<li>${escapeHtml(query)}</li>`).join('')}</ol>`
                            : '<p class="helper-text">No search queries available.</p>'}
                    </section>
                    <section class="stack">
                        <h3 class="panel-title">Processing Time Breakdown</h3>
                        <div class="summary-strip">
                            <div class="summary-cell"><span class="label">Search</span><span class="value">${timing.search_papers ? Number(timing.search_papers).toFixed(2) : 'N/A'}s</span></div>
                            <div class="summary-cell"><span class="label">Paper Processing</span><span class="value">${timing.paper_processing ? Number(timing.paper_processing).toFixed(2) : 'N/A'}s</span></div>
                            <div class="summary-cell"><span class="label">Report Generation</span><span class="value">${timing.report_generation ? Number(timing.report_generation).toFixed(2) : 'N/A'}s</span></div>
                            <div class="summary-cell"><span class="label">Total</span><span class="value">${timing.total_time ? Number(timing.total_time).toFixed(2) : 'N/A'}s</span></div>
                        </div>
                    </section>
                </div>
            `;
        }

        async function loadReport() {
            if (!claimId || !batchId) {
                reportContent.innerHTML = `<div class="empty-state"><strong>Missing report identifiers.</strong><span>Both batch ID and claim ID are required.</span></div>`;
                return;
            }
            try {
                const data = await fetchJson(`/api/v1/claims/${encodeURIComponent(batchId)}/${encodeURIComponent(claimId)}/report`);
                if (data.report || data.additional_info) {
                    displayReport(data);
                } else {
                    reportContent.innerHTML = `<div class="empty-state"><strong>Report not found.</strong></div>`;
                }
            } catch (error) {
                if (error.message?.includes('processing')) {
                    window.location.href = `/progress?batch_id=${encodeURIComponent(batchId)}&claim_id=${encodeURIComponent(claimId)}`;
                    return;
                }
                reportContent.innerHTML = `<div class="status-card error-card"><strong>Report failed to load.</strong><span>${escapeHtml(error.message || 'Error loading report.')}</span></div>`;
            }
        }

        document.getElementById('downloadReport').addEventListener('click', () => {
            if (claimId && batchId) window.location.href = `/api/v1/claims/${encodeURIComponent(batchId)}/${encodeURIComponent(claimId)}/download_md`;
        });
        document.getElementById('viewTracePage').addEventListener('click', () => {
            if (claimId && batchId) window.location.href = buildTraceViewerUrl();
        });
        document.getElementById('downloadTrace').addEventListener('click', () => {
            if (claimId && batchId) window.location.href = `/api/v1/claims/${encodeURIComponent(batchId)}/${encodeURIComponent(claimId)}/trace`;
        });
        document.getElementById('downloadIssues').addEventListener('click', () => {
            if (claimId && batchId) window.location.href = `/api/v1/claims/${encodeURIComponent(batchId)}/${encodeURIComponent(claimId)}/issues`;
        });
        document.getElementById('downloadCitations').addEventListener('click', () => {
            if (claimId && batchId) window.location.href = `/api/v1/claims/${encodeURIComponent(batchId)}/${encodeURIComponent(claimId)}/download_citations`;
        });
        document.getElementById('deleteClaimButton').addEventListener('click', async () => {
            if (!claimId || !batchId) {
                setStatus(reportStatus, { title: 'Delete blocked', message: 'Batch ID and claim ID are required.', tone: 'warning' });
                return;
            }
            if (!window.confirm('Delete this claim run?')) return;
            const button = document.getElementById('deleteClaimButton');
            const restore = buttonBusy(button, 'Deleting…');
            try {
                const data = await fetchJson(`/api/v1/delete/claim/${encodeURIComponent(batchId)}/${encodeURIComponent(claimId)}`, { method: 'DELETE' });
                setStatus(reportStatus, { title: 'Claim deleted', message: data.message || 'The claim was deleted.', tone: 'warning' });
                window.location.href = '/browser';
            } catch (error) {
                restore();
                flashButton(button, { label: 'Delete failed ✗', tone: 'error' });
                setStatus(reportStatus, { title: 'Delete failed', message: error.message, tone: 'error' });
            }
        });

        loadReport();
    </script>
{% endblock %}
