{% extends "base.html" %}

{% block content %}
    <section class="panel">
        <div class="panel-header">
            <div>
                <h2 class="panel-title">Claim Library</h2>
                <p class="panel-subtitle">Search and filter evaluated claims.</p>
            </div>
            <a href="{{ url_for('api.guidebook_page') }}#claims-browser" class="help-link" title="Guidebook: Claims Browser">?</a>
        </div>
        <div class="grid-two">
            <div class="form-row">
                <label for="searchInput">Search claims</label>
                <input type="text" id="searchInput" placeholder="Search by text or claim key">
            </div>
            <div class="inline-actions" style="align-items:end">
                <button type="button" class="secondary-button" id="searchBtn">Search</button>
                <button type="button" class="ghost-button" id="clearBtn">Clear</button>
            </div>
        </div>
        <div class="summary-strip" style="margin-top:18px">
            <div class="summary-cell">
                <span class="label">Claims</span>
                <span class="value" id="claimCount">0</span>
            </div>
        </div>
        <div id="claimBrowserStatus" class="status-card info-card hidden" style="margin-top:18px"></div>
    </section>

    <section class="panel">
        <div id="claimList" class="record-list"></div>
    </section>
{% endblock %}

{% block scripts %}
    <script src="{{ url_for('static', filename='claims_browser.js') }}"></script>
{% endblock %}
