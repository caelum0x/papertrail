# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    # Use mock ontology to avoid having to use ontolog servicey and
    # high-memory full ontology
    pre_build:
      - >-
        BIOONTOLOGY_VERSION=$(python -m indra.ontology.bio version) &&
        mkdir -p $HOME/.indra/bio_ontology/$BIOONTOLOGY_VERSION &&
        wget -nv
        https://bigmech.s3.amazonaws.com/travis/bio_ontology/$BIOONTOLOGY_VERSION/mock_ontology.pkl
        -O $HOME/.indra/bio_ontology/$BIOONTOLOGY_VERSION/bio_ontology.pkl

python:
  install:
    - requirements: doc/requirements.txt

sphinx:
  configuration: doc/conf.py
